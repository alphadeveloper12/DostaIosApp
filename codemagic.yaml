workflows:
  ios-app-store:
    name: Dosta iOS - App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Dosta

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dosta.app
      node: 22.11.0
      vars:
        BUNDLE_ID: com.dosta.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App

    scripts:
      - name: Install dependencies
        script: npm install --include=dev

      - name: Build web app
        script: npm run build

      - name: Capacitor sync iOS
        script: node node_modules/@capacitor/cli/bin/cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
